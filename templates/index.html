<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiche d'urgence - Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #cec9c9; 
            color: #333; 
        }
        h1, h2, h3 { color: #2c3e50; } 
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" href="/"> Fiche d'Urgence</a>
        <div class="d-flex align-items-center">
            {% if session.get('user_id') %}
                <a href="/logout" class="btn btn-outline-light btn-sm me-3">Déconnexion</a>
            {% endif %}
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" style="height: 40px; border-radius: 5px;">
        </div>
    </div>
    </nav>



    <div class="text-center">
    <h1>Bienvenue sur votre Fiche d'urgence</h1>
    <p>Une solution simple pour transmettre vos informations vitales en cas de problème.</p>
    <hr>
    <a href="/login">Se connecter</a> 
    <br>
    <a href="/new_user">Créer un compte</a>
    
    </div>
</body>
</html>
