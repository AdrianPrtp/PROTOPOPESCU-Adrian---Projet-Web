<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #cec9c9; 
            color: #333; 
        }
        h1, h2, h3 { color: #2c3e50; } 
    </style>

</head>


<body>


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" href="/"> Fiche d'Urgence</a>
        <div class="d-flex align-items-center">
            {% if session.get('user_id') %}
                <a href="/logout" class="btn btn-outline-light btn-sm me-3">Déconnexion</a>
            {% endif %}
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" style="height: 40px; border-radius: 5px;">
        </div>
    </div>
    </nav>



    <div class="text-center">
    <h1>Inscription</h1>

    <form action="/new_user" method="POST">
        <div>
            <label>Je m'inscris en tant que :</label><br>
            <input type="radio" id="patient" name="role" value="patient" checked> 
            <label for="patient">Patient</label>
            
            <input type="radio" id="helper" name="role" value="helper" checked> 
            <label for="helper">Accompagnant</label>
        </div>
        <br>

        <p>
            <label>Nom d'utilisateur :</label><br>
            <input type="text" name="username" class="form-control mx-auto w-50" required>
        </p>
        <p>
            <label>Mot de passe :</label><br>
            <input type="password" name="password" class="form-control mx-auto w-50" required>
        </p>
        
        <button type="submit" class = "btn btn-primary">Créer mon compte</button>
    </form>

    <br>
    <a href="/">Retour à l'accueil</a>
    </div>




    <script>       //----------------- Limitation de la longueur du mdp a au moins 4 caractères --------------------
        
        const form = document.querySelector('form');
        
        form.onsubmit = function(event) {
            const password = document.getElementsByName('password')[0].value;
            
            if (password.length < 4) {
                alert("Le mot de passe doit contenir au moins 4 caractères !");
                event.preventDefault(); 
            }
        };
    </script>

</body>
</html>
